<!DOCTYPE html>
<html lang="zh-CN" style="color-scheme: dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e17">
  <title>XJTU Compiler Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="lg" x1="3" y1="2" x2="21" y2="22"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs>
      </svg>
      <span>XJTU <span class="accent">Compiler</span></span>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-view="dfa" role="tab" aria-selected="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        DFA Explorer
      </button>
      <button class="tab" data-view="scanner" role="tab" aria-selected="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        Lexical Analyzer
      </button>
      <div class="tab-indicator"></div>
    </nav>
    <a href="https://github.com/AstralArtisan/XJTU-Compiler" class="github-link" target="_blank" rel="noopener" aria-label="View on GitHub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    </a>
  </header>

  <!-- DFA Explorer -->
  <main id="view-dfa" class="view active">
    <div class="grid-2">
      <section class="card fade-in">
        <div class="card-header">
          <h2>DFA Definition</h2>
          <div class="btn-group">
            <button id="btn-mode-form" class="btn btn-sm btn-ghost active-toggle" aria-pressed="true">Form</button>
            <button id="btn-mode-json" class="btn btn-sm btn-ghost" aria-pressed="false">JSON</button>
            <button id="btn-load-sample" class="btn btn-sm btn-ghost">Sample</button>
          </div>
        </div>
        <!-- Form mode -->
        <div id="dfa-form" class="dfa-form">
          <div class="form-row">
            <label for="df-alphabet">Alphabet</label>
            <input type="text" id="df-alphabet" class="input" placeholder="e.g. ab" spellcheck="false">
          </div>
          <div class="form-row-2">
            <div class="form-row">
              <label for="df-states">States</label>
              <input type="number" id="df-states" class="input input-sm" value="3" min="1">
            </div>
            <div class="form-row">
              <label for="df-start">Start</label>
              <input type="number" id="df-start" class="input input-sm" value="1" min="0">
            </div>
          </div>
          <div class="form-row">
            <label for="df-accept">Accept states</label>
            <input type="text" id="df-accept" class="input" placeholder="e.g. 3" spellcheck="false">
          </div>
          <div class="form-row">
            <label>Transition table <span class="hint">(one row per state, space-separated next states)</span></label>
            <textarea id="df-trans" class="code-editor code-editor-sm" spellcheck="false" rows="4" aria-label="Transition table"></textarea>
          </div>
        </div>
        <!-- JSON mode -->
        <textarea id="dfa-json" class="code-editor hidden" spellcheck="false" rows="10" aria-label="DFA JSON"></textarea>
        <button id="btn-render-dfa" class="btn btn-primary btn-block">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Render
        </button>
      </section>
      <section class="card fade-in" style="animation-delay:.05s">
        <div class="card-header"><h2>State Transition Graph</h2></div>
        <div class="canvas-wrap">
          <canvas id="dfa-canvas"></canvas>
        </div>
      </section>
    </div>
    <div class="grid-2">
      <section class="card fade-in" style="animation-delay:.1s">
        <div class="card-header"><h2>String Tester</h2></div>
        <div class="input-row">
          <input type="text" id="dfa-test-input" class="input" placeholder="Enter string to test..." aria-label="Test string">
          <button id="btn-test-string" class="btn btn-primary">Test</button>
          <button id="btn-animate" class="btn btn-ghost">Animate</button>
        </div>
        <div id="dfa-test-result" class="result-box" aria-live="polite"></div>
        <div id="dfa-step-display" class="step-trace" aria-live="polite"></div>
      </section>
      <section class="card fade-in" style="animation-delay:.15s">
        <div class="card-header"><h2>Accepted Strings</h2></div>
        <div class="input-row">
          <label for="dfa-enum-len" class="label-text">Max length</label>
          <input type="number" id="dfa-enum-len" class="input input-sm" value="3" min="0" max="8">
          <button id="btn-enumerate" class="btn btn-primary">Enumerate</button>
        </div>
        <div id="dfa-enum-result" class="enum-list" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <!-- Lexical Analyzer -->
  <main id="view-scanner" class="view">
    <div class="grid-2 scanner-grid">
      <section class="card fade-in">
        <div class="card-header">
          <h2>Source Code</h2>
          <div class="btn-group">
            <button id="btn-scan-sample" class="btn btn-ghost btn-sm">Sample</button>
            <button id="btn-scan-run" class="btn btn-primary btn-sm">Scan</button>
            <label class="btn btn-ghost btn-sm" tabindex="0">
              Upload JSON
              <input type="file" id="scan-file-input" accept=".json" hidden>
            </label>
          </div>
        </div>
        <textarea id="scan-source" class="code-editor code-editor-tall" spellcheck="false" aria-label="Source code" placeholder="Type or paste source code here, then click Scan..."></textarea>
        <div id="scan-highlighted" class="highlighted-overlay"></div>
      </section>
      <section class="card fade-in" style="animation-delay:.05s">
        <div class="card-header">
          <h2>Token Stream</h2>
          <select id="scan-mode" class="select" aria-label="Scanner mode">
            <option value="hand">Hand-written</option>
            <option value="table">Table-driven</option>
          </select>
        </div>
        <div class="table-wrap">
          <table id="token-table" class="token-table">
            <thead><tr><th>#</th><th>Kind</th><th>Lexeme</th><th>Pos</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="scan-stats" class="stats-bar" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
